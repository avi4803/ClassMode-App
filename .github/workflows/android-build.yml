name: Android Production Build
on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Build Target'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true

      - name: 🏗 Prebuild Android
        run: npx expo prebuild --platform android

      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/android/app/release.keystore

      - name: 🚀 Build Android (${{ github.event.inputs.build_target }})
        run: |
          cd android
          chmod +x gradlew
          if [ "${{ github.event.inputs.build_target }}" == "apk" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/release.keystore \
              -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }} --no-daemon
          else
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/release.keystore \
              -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }} --no-daemon
          fi

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: classmode-build-${{ github.event.inputs.build_target }}
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          retention-days: 7
