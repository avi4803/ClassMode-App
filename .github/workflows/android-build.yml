name: Android Production Build
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true

      - name: 🏗 Prebuild Android
        run: npx expo prebuild --platform android

      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: 🚀 Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }} \
            --no-daemon

      - name: ⚡ Generate Fast Direct Download Link
        run: |
          aab_path="android/app/build/outputs/bundle/release/app-release.aab"
          # Upload to transfer.sh and print the link
          URL=$(curl --upload-file $aab_path https://transfer.sh/classmode-release.aab)
          echo "DOWNLOAD_URL=$URL" >> $GITHUB_ENV
          
      - name: 📢 Print Fast Link
        run: |
          echo "----------------------------------------------------------------"
          echo "PRODUCTION AAB DOWNLOAD LINK (Fast):"
          echo "${{ env.DOWNLOAD_URL }}"
          echo "----------------------------------------------------------------"

      - name: 📤 Upload AAB (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: classmode-production-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
